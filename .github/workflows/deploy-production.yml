name: Deploy production

on:
  push:
    branches: [production]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

# Shared concurrency group with deploy-development to prevent race conditions
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: production

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # TODO: Add deployment steps once hosting is configured
      # - name: Deploy to Railway
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      #   run: npx @railway/cli up --service SocialiseHub-prod

  # Back-merge production into development to keep branches in sync
  sync-development:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Merge production into development
        uses: actions/github-script@v8
        with:
          script: |
            try {
              await github.rest.repos.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: 'development',
                head: 'production',
                commit_message: 'chore: sync development with production merge commits [skip ci]',
              });
              core.info('Successfully synced development with production');
            } catch (error) {
              // 204 = nothing to merge (already in sync), which is fine
              if (error.status === 204) {
                core.info('Branches already in sync — nothing to merge');
              } else {
                core.warning(`Back-merge failed: ${error.message}`);
                // Create an issue to alert maintainers about the sync failure
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: 'Back-merge production -> development failed',
                  body: `The automatic back-merge of \`production\` into \`development\` failed after a production deploy.\n\n**Error:** ${error.message}\n\nThis means \`development\` is behind \`production\` by one or more merge commits. To fix:\n\n\`\`\`bash\ngit fetch origin\ngit checkout development\ngit merge origin/production\n# Resolve any conflicts\ngit push origin development\n\`\`\`\n\n*Automated by deploy-production.yml*`,
                  labels: ['needs-triage'],
                });
                core.warning('Created issue to track back-merge failure');
              }
            }
