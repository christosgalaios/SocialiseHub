name: Deploy development

on:
  push:
    branches: [development]
  workflow_dispatch:

permissions:
  contents: write

# Shared concurrency group with deploy-production to prevent race conditions
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: development

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

